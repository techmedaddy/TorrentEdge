global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: torrentedge-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3029

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
