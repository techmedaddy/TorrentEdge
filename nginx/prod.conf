# nginx/prod.conf — production reverse proxy for TorrentEdge

server {
  listen 80;
  server_name _;

  # Redirect HTTP → HTTPS (uncomment when TLS certs are in place)
  # return 301 https://$host$request_uri;

  # ── Static frontend ──────────────────────────────────────────────
  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Backend API ───────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend:3029;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Upload size limit (adjust for large torrent files)
    client_max_body_size 500m;
  }

  # ── WebSocket (Socket.IO) ─────────────────────────────────────────
  location /socket.io/ {
    proxy_pass http://backend:3029/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400s;
  }
}

# ── HTTPS (uncomment + fill in cert paths once TLS is ready) ─────────
