version: '3.8'

services:
  # The Event Bus
  kafka:
    image: bitnami/kafka:3.6
    container_name: torrentedge-kafka
    restart: unless-stopped
    environment:
      # Run in KRaft mode (No Zookeeper = Saves ~300MB RAM)
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # THE MOST CRITICAL LINE: Hard limit the Java Virtual Machine to 256MB
      - KAFKA_HEAP_OPTS=-Xmx256m -Xms256m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # The Control Plane
  api:
    image: torrentedge-backend:latest
    container_name: torrentedge-api
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "3029:3029"
    environment:
      # Hard limit the Node.js V8 Engine to 256MB
      - NODE_OPTIONS=--max-old-space-size=256
      - NODE_ENV=production
      # Point these to your Free Tier AWS resources
      - POSTGRES_URI=${AWS_RDS_POSTGRES_URI}
      - REDIS_URI=${AWS_ELASTICACHE_REDIS_URI}
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - torrent_data:/usr/src/app/downloads
      - torrent_logs:/usr/src/app/logs

  # The Data Plane
  worker-1:
    image: torrentedge-backend:latest
    container_name: torrentedge-worker-1
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # Hard limit the Node.js V8 Engine to 256MB
      - NODE_OPTIONS=--max-old-space-size=256
      - NODE_ENV=production
      # Tell the codebase to run purely as a background worker
      - RUN_AS_WORKER_ONLY=true 
      - WORKER_NODE_ID=free-tier-worker-1
      - POSTGRES_URI=${AWS_RDS_POSTGRES_URI}
      - REDIS_URI=${AWS_ELASTICACHE_REDIS_URI}
      - KAFKA_BROKERS=kafka:9092
    volumes:
      # Must mount the exact same volume as the API for the CAS store to deduplicate
      - torrent_data:/usr/src/app/downloads
      - torrent_logs:/usr/src/app/logs

volumes:
  torrent_data:
  torrent_logs:
